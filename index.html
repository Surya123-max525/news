<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraDraw | Client-Side AI Hand Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Load MediaPipe via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <style>
    :root {
      --primary: #4F46E5;
      --surface: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #F8FAFC;
    }
    body {
      margin: 0; font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at center, #1E1B4B, #0F172A);
      color: var(--text); display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 3rem; background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border); z-index: 10;
    }
    .logo {
      font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(135deg, #818CF8, #C084FC);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    .container {
      display: flex; flex: 1; gap: 2rem; padding: 2rem;
      height: calc(100vh - 80px); box-sizing: border-box;
    }
    .sidebar {
      width: 300px; padding: 2rem; background: var(--surface);
      backdrop-filter: blur(20px); border-radius: 24px;
      border: 1px solid var(--glass-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto;
    }
    .section-title {
      font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;
      color: #94A3B8; margin-bottom: 1rem; font-weight: 600;
    }
    .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .color-btn {
      aspect-ratio: 1; border-radius: 50%; border: 3px solid transparent;
      cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px currentColor; }
    
    .slider-container { margin-top: 0.5rem; }
    input[type=range] { width: 100%; accent-color: var(--primary); }
    
    .bg-segment {
      display: flex; background: rgba(0,0,0,0.3);
      border-radius: 8px; overflow: hidden; margin-top: 0.5rem;
    }
    .bg-btn {
      flex: 1; padding: 0.5rem; border: none; background: transparent;
      color: #94A3B8; cursor: pointer; font-size: 0.8rem; font-weight: 600;
    }
    .bg-btn.active { background: var(--primary); color: white; }
    
    .action-btn {
      width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05); color: white; font-weight: 600;
      cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .action-btn:hover { background: rgba(255, 255, 255, 0.1); }
    .action-btn.danger { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: #FCA5A5; }
    .action-btn.success { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); color: #34D399; }
    
    .feed-container {
      flex: 1; position: relative; border-radius: 24px; overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid var(--glass-border);
      background: #000;
    }
    /* The canvas will draw everything: camera feed (if enabled) + lines */
    canvas.output_canvas {
      width: 100%; height: 100%; object-fit: contain; 
      /* Mirror canvas so it moves like a mirror */
      transform: scaleX(-1);
    }
    /* Hidden video element just to feed Mediapipe */
    .input_video { display: none; }
    
    .status-badge {
      position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(16, 185, 129, 0.2);
      border: 1px solid rgba(16, 185, 129, 0.3); color: #34D399; padding: 0.5rem 1rem;
      border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; z-index: 10;
    }
    .pulse {
      width: 8px; height: 8px; background: #34D399; border-radius: 50%; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(52,211,153,0.7);} 70% {box-shadow: 0 0 0 10px rgba(52,211,153,0);} }
  </style>
</head>
<body>
  <nav><div class="logo">AuraDraw Web ✨</div></nav>
  <div class="container">
    <!-- UI Controls -->
    <div class="sidebar">
      <div>
        <div class="section-title">Brush Color</div>
        <div class="color-grid">
          <button class="color-btn active" style="background:#EF4444; color:#EF4444;" onclick="setColor('#EF4444', this)"></button>
          <button class="color-btn" style="background:#3B82F6; color:#3B82F6;" onclick="setColor('#3B82F6', this)"></button>
          <button class="color-btn" style="background:#10B981; color:#10B981;" onclick="setColor('#10B981', this)"></button>
          <button class="color-btn" style="background:#F59E0B; color:#F59E0B;" onclick="setColor('#F59E0B', this)"></button>
          <button class="color-btn" style="background:#8B5CF6; color:#8B5CF6;" onclick="setColor('#8B5CF6', this)"></button>
          <button class="color-btn" style="background:#EC4899; color:#EC4899;" onclick="setColor('#EC4899', this)"></button>
        </div>
      </div>
      <div>
        <div class="section-title">Brush Style</div>
        <div class="slider-container">
          <label style="font-size:0.8rem; color:#94A3B8; display:flex; justify-content:space-between;">
            <span>Thickness</span><span id="brushSizeViewer">6px</span>
          </label>
          <input type="range" min="2" max="60" value="6" oninput="setThickness(this.value)" />
          <div style="margin-top: 1rem; display:flex; align-items:center; gap: 0.5rem; cursor:pointer;">
            <input type="checkbox" id="neonGlow" onchange="toggleNeon(this.checked)" style="width:auto; accent-color:var(--primary);"/>
            <label for="neonGlow" style="font-size: 0.8rem; color: #94A3B8; cursor:pointer; font-weight:600;">✨ Enable Neon Glow</label>
          </div>
        </div>
      </div>
      <div>
        <div class="section-title">Draw Gesture</div>
        <div class="bg-segment" id="gesture-segment" style="margin-top:0;">
          <button class="bg-btn active" onclick="setGesture('index', this)">Index Up</button>
          <button class="bg-btn" onclick="setGesture('pinch', this)">Pinch Mode</button>
        </div>
      </div>
      <div>
        <div class="section-title">Background</div>
        <div class="bg-segment">
          <button class="bg-btn active" onclick="setBg('camera', this)">Camera</button>
          <button class="bg-btn" onclick="setBg('black', this)">Black</button>
          <button class="bg-btn" onclick="setBg('white', this)">White</button>
        </div>
      </div>
      <div>
        <div class="section-title">Actions</div>
        <div style="display:flex; flex-direction: column; gap:1rem;">
          <button class="action-btn" onclick="undoPath()" style="background: rgba(255, 255, 255, 0.1);">
            <span style="font-size:1.2rem;">↩️</span> Undo Last Stroke
          </button>
          <button class="action-btn" onclick="setColor('eraser', this)">
            <span style="font-size:1.2rem;">🧽</span> Eraser Mode
          </button>
          <button class="action-btn danger" onclick="clearCanvas()">
            <span style="font-size:1.2rem;">🗑️</span> Clear Canvas
          </button>
          <button class="action-btn success" onclick="saveImage()">
            <span style="font-size:1.2rem;">💾</span> Save Masterpiece
          </button>
        </div>
      </div>
    </div>
    
    <!-- Render Container -->
    <div class="feed-container">
      <div class="status-badge" id="status-badge">
        <div class="pulse"></div> Waiting for Camera...
      </div>
      <video class="input_video"></video>
      <canvas class="output_canvas" width="1280" height="720"></canvas>
    </div>
  </div>

  <script>
    // --- Global State ---
    let currentColor = '#EF4444';
    let isEraser = false;
    let brushThickness = 6;
    let bgMode = 'camera'; 
    let drawGesture = 'index';
    let neonEnabled = false;
    let paths = []; // Stores all drawing paths: { color, thickness, isEraser, neon, points: [{x,y}] }
    let currentPath = null;
    let smoothX = 0, smoothY = 0;
    const alpha = 0.3; // Smoothing factor
    let lostFrames = 0;

    // --- DOM Elements ---
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusBadge = document.getElementById('status-badge');

    // --- UI Listeners ---
    function setColor(color, btn) {
      if (color === 'eraser') {
        isEraser = true;
      } else {
        isEraser = false;
        currentColor = color;
      }
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
      if(btn) btn.classList.add('active');
    }
    function setThickness(val) {
      brushThickness = parseInt(val, 10);
      document.getElementById('brushSizeViewer').innerText = val + 'px';
    }
    function setBg(mode, btn) {
      bgMode = mode;
      document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
      if(btn) btn.classList.add('active');
    }
    function setGesture(gesture, btn) {
      drawGesture = gesture;
      const seg = document.getElementById('gesture-segment');
      seg.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
      if(btn) btn.classList.add('active');
    }
    function toggleNeon(isEnabled) {
      neonEnabled = isEnabled;
    }
    function clearCanvas() {
      paths = [];
      currentPath = null;
    }
    function undoPath() {
      if(paths.length > 0) {
        paths.pop();
        currentPath = null;
      }
    }
    function saveImage() {
      // Temporarily remove transform mirror to save normal image
      canvasElement.style.transform = "scaleX(1)";
      const link = document.createElement('a');
      link.download = 'auradraw_masterpiece.png';
      link.href = canvasElement.toDataURL();
      link.click();
      canvasElement.style.transform = "scaleX(-1)";
    }

    // --- Hand Tracking Logic ---
    function onResults(results) {
      // Update Status Badge
      if(statusBadge.innerText.includes('Waiting')) {
        statusBadge.innerHTML = '<div class="pulse"></div> Tracking Active';
      }

      // Draw Background
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      if (bgMode === 'camera' && results.image) {
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      } else if (bgMode === 'black') {
        canvasCtx.fillStyle = '#000000';
        canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
      } else if (bgMode === 'white') {
        canvasCtx.fillStyle = '#ffffff';
        canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
      }
      
      // Determine hand state
      let isDrawing = false;
      let clearStance = false;

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        let landmarks = results.multiHandLandmarks[0];
        
        // Convert to canvas coordinates
        let ix = landmarks[8].x * canvasElement.width;
        let iy = landmarks[8].y * canvasElement.height;
        
        // Smoothing
        if (lostFrames > 3 || currentPath === null) {
          smoothX = ix; smoothY = iy;
        } else {
          smoothX = alpha * ix + (1 - alpha) * smoothX;
          smoothY = alpha * iy + (1 - alpha) * smoothY;
        }

        // Fingers UP logic
        let indexUp = landmarks[8].y < landmarks[6].y;
        let middleUp = landmarks[12].y < landmarks[10].y;
        let ringUp = landmarks[16].y < landmarks[14].y;
        let pinkyUp = landmarks[20].y < landmarks[18].y;
        let thumbUp = landmarks[4].y < landmarks[2].y;

        let totalFingers = [indexUp, middleUp, ringUp, pinkyUp, thumbUp].filter(x => x).length;

        // Calculate distance for pinch
        let dx = landmarks[8].x - landmarks[4].x;
        let dy = landmarks[8].y - landmarks[4].y;
        let pinchDist = Math.sqrt(dx*dx + dy*dy);

        if (drawGesture === 'index') {
          if (indexUp && !middleUp) isDrawing = true;
        } else if (drawGesture === 'pinch') {
          if (pinchDist < 0.06) isDrawing = true;
          // Smooth coords using the middle point of pinch for better accuracy
          let midX = (landmarks[8].x + landmarks[4].x) / 2 * canvasElement.width;
          let midY = (landmarks[8].y + landmarks[4].y) / 2 * canvasElement.height;
          if (lostFrames <= 3 && currentPath !== null) {
            smoothX = alpha * midX + (1 - alpha) * smoothX;
            smoothY = alpha * midY + (1 - alpha) * smoothY;
          } else {
            smoothX = midX; smoothY = midY;
          }
        }

        if (totalFingers === 5 && pinchDist > 0.1) clearStance = true;

        if (isDrawing) {
          lostFrames = 0;
          if (!currentPath) {
            currentPath = { color: currentColor, thickness: brushThickness, isEraser: isEraser, neon: neonEnabled, points: [] };
            paths.push(currentPath);
          }
           // if properties changed mid-draw, break path
          else if (currentPath.color !== currentColor || currentPath.thickness !== brushThickness || currentPath.isEraser !== isEraser || currentPath.neon !== neonEnabled) {
            currentPath = { color: currentColor, thickness: brushThickness, isEraser: isEraser, neon: neonEnabled, points: [] };
            paths.push(currentPath);
          }
          currentPath.points.push({x: smoothX, y: smoothY});
        } else {
          currentPath = null;
          lostFrames++;
        }

        if (clearStance) {
          clearCanvas();
        }
      } else {
        currentPath = null;
        lostFrames++;
      }

      // Render all paths
      canvasCtx.lineCap = 'round';
      canvasCtx.lineJoin = 'round';
      
      for (let p of paths) {
        if(p.points.length < 2) continue;
        
        if (p.isEraser) {
          // Eraser logic uses 'destination-out' to clear transparency (useful if camera mode) 
          // or draws bg_color (if black/white)
          canvasCtx.shadowBlur = 0;
          if (bgMode === 'camera') {
            canvasCtx.globalCompositeOperation = 'destination-out';
            canvasCtx.strokeStyle = 'rgba(0,0,0,1)';
          } else {
            canvasCtx.globalCompositeOperation = 'source-over';
            canvasCtx.strokeStyle = (bgMode === 'black') ? '#000000' : '#ffffff';
          }
          canvasCtx.lineWidth = p.thickness * 4; // Eraser is naturally wider
        } else {
          canvasCtx.globalCompositeOperation = 'source-over';
          canvasCtx.strokeStyle = p.color;
          canvasCtx.lineWidth = p.thickness;
          
          if (p.neon) {
            canvasCtx.shadowBlur = 15;
            canvasCtx.shadowColor = p.color;
          } else {
            canvasCtx.shadowBlur = 0;
            canvasCtx.shadowColor = 'transparent';
          }
        }

        canvasCtx.beginPath();
        canvasCtx.moveTo(p.points[0].x, p.points[0].y);
        for(let i=1; i<p.points.length; i++) {
          canvasCtx.lineTo(p.points[i].x, p.points[i].y);
        }
        canvasCtx.stroke();
      }
      
      canvasCtx.globalCompositeOperation = 'source-over'; // reset
      canvasCtx.restore();
    }

    // --- Init MediaPipe ---
    const hands = new Hands({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.8,
      minTrackingConfidence: 0.8
    });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    camera.start();
  </script>
</body>
</html>
